<!DOCTYPE html>

<style>
:root {
  --azul:#1f2a37;
  --dourado:#b58b4c;
  --cinza:#6b7280;
}

/* FUNDO PROFISSIONAL */
body {
  margin:0;
  font-family:Arial;
  background:url('fundo.jpg') no-repeat center center fixed;
  background-size:cover;
}

body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

/* BANNER TOPO */
.banner {
  width:100%;
  height:250px;
  background:url('banner.jpg') no-repeat center;
  background-size:cover;
}

/* CONTAINER */
.container {
  width:90%;
  max-width:420px;
  background:rgba(255,255,255,0.97);
  margin:-80px auto 40px;
  padding:25px;
  border-radius:15px;
  box-shadow:0px 20px 40px rgba(0,0,0,0.4);
  position:relative;
  z-index:1;
}

/* LOGO */
.logo {
  width:120px;
  display:block;
  margin:0 auto 10px;
}

/* TITULOS */
h1 {
  text-align:center;
  color:var(--azul);
}

.sub {
  text-align:center;
  color:var(--cinza);
  font-size:14px;
}

/* FORM */
input, select {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

/* BOTÃO PISCANDO */
@keyframes pulse {
  0% {transform:scale(1);}
  70% {transform:scale(1.05);}
  100% {transform:scale(1);}
}

.btn {
  width:100%;
  background:linear-gradient(45deg,#b58b4c,#d4af37);
  color:white;
  border:none;
  padding:16px;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  animation:pulse 1.6s infinite;
}

/* BENEFICIOS */
.benefits p {
  background:#f9fafb;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

/* OPERADORAS */
.grid-operadoras {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.grid-operadoras img {
  width:100%;
  border-radius:8px;
  background:#fff;
  padding:5px;
}

/* SOCIAL */
.social-btn {
  display:block;
  text-align:center;
  padding:12px;
  border-radius:10px;
  color:white;
  text-decoration:none;
  font-weight:bold;
  margin-top:10px;
}

.insta {background:linear-gradient(45deg,#833AB4,#E1306C,#F77737);}
.google {background:#4285F4;}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
}
</style>
</head>

+ "CNPJ: " + cnpj + "%0A"

window.open("https://wa.me/554188662889?text=" + msg, '_blank');
